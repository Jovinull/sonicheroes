# The disc ships no .map file, so symbols come from analysis only.

# Linker generation confirmed as GC 1.0 to 2.6, from the exception runtime:
#
#   GetR2__Fv             .text:0x801B9C94  size 0x8   (absent on GC 2.7+)
#   __fini_cpp_exceptions .text:0x801B9C9C  size 0x34
#   __init_cpp_exceptions .text:0x801B9CD0  size 0x40  (0x3C on GC 2.7+)
