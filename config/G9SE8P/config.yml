# That rules out 11 and 14. configure.py assumes a GC/1.3.2 linker, so 10.
#   8  = CW for GameCube 1.0+
#   10 = CW for GameCube 1.3.2+
#   11 = CW for GameCube 2.7+
#   14 = CW for GameCube 3.0a3+
