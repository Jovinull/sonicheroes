# Resolved: the RELs reproduce. build.sha1 verifies all 17 alongside main.dol.
#
# These RELs reserve an empty section slot before .text. Taking autosaveD as the
# example, the original has 20 sections with a zero sized one at index 1, at
# offset 0xEC right before .text at index 2. mwld drops it during the partial
# link because nothing lands in it, and dtk wrote its section table straight
# from the object's section indices, so every section came out one index low and
# prologSection, epilogSection and unresolvedSection moved from 2 to 1. That is
# why dtk could not re-read its own output.
#
# The earlier guess here was that it needed a custom partial ldscript per module
# to emit the empty section. It does not: five ways of forcing the section to
# survive the link were measured and none of them keep it, because mwld will not
# emit a section nothing lands in. The fix belongs in dtk, which now maps object
# section indices onto the original REL's, and is pinned as the v1.8.3-sh1 fork
# in tools/download_tool.py. Upstream issue:
# https://github.com/encounter/decomp-toolkit/issues/144
#
# Known issue: stage00D.rel is excluded.
#
# stage00D has 3978 relocations pointing at module 0 (the DOL) at addresses past
# the end of the DOL BSS (0x804302D0). They resolve to only 46 distinct targets,
# all inside 0x804498D8 to 0x8044B694, a region of about 7.6 KB sitting roughly
# 103 KB past the end of the DOL. dtk cannot map those to a section and aborts
# the whole split.
#
# block_relocations does not help. Its target has to resolve to a section, which
# is the part that fails here.
#
# stage00D also shares module ID 3 with stage01D, so the two are never loaded at
# the same time. That suggests stage00D is shared or always resident code rather
# than a normal stage module.
#
# Leaving it out unblocks the other 18 objects. Needs to be solved before anyone
# works on stage00D seriously.
